name: Refactor
description: Improve or refactor existing code
labels: ["refactor"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Propose a code refactor to improve quality, performance, or maintainability.

  - type: input
    id: title
    attributes:
      label: Refactor title
      description: "Example: Extract duplicated controller logic."
      placeholder: "Enter a descriptive title"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Explain what will be refactored."
      placeholder: "What code is being refactored?"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Current problem
      description: "What is the problem with the current code?"
      placeholder: |
        - Duplicated code in multiple places
        - Hard to maintain
        - Poor performance
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How do you propose solving this problem?"
      placeholder: "Describe the refactoring approach."
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: "What are the benefits of this refactor?"
      placeholder: |
        - Reduces duplicated code
        - Makes future maintenance easier
        - Improves performance

  - type: textarea
    id: files
    attributes:
      label: Affected files
      description: "Which files will be changed?"
      placeholder: |
        - app/Http/Controllers/PostController.php
        - app/Services/PostService.php

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: "Steps to complete the refactor."
      placeholder: |
        - [ ] Extract duplication
        - [ ] Add tests for coverage
        - [ ] Verify performance
        - [ ] Update documentation

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: "What is the impact of this change?"
      placeholder: |
        - Breaking changes, if any
        - Affected files
        - Required tests

  - type: checkboxes
    id: area
    attributes:
      label: Affected area
      options:
        - label: "Backend"
        - label: "Frontend"
        - label: "Database"
        - label: "Architecture"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High, blocks other tasks
        - Medium, nice to have
        - Low, technical maintenance
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: "Any important extra information."
      placeholder: "Links, references, examples, etc."
