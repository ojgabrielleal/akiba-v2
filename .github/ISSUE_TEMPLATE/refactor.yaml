name: "Refatoracao"
description: "Proponha uma melhoria em codigo existente"
labels: ["refactor"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descricao
      placeholder: "O que deve ser refatorado?"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Motivo
      placeholder: "Por que essa mudanca ajuda?"

  - type: textarea
    id: tasks
    attributes:
      label: Tarefas
      placeholder: |
        - [ ] Tarefa 1
        - [ ] Tarefa 2
