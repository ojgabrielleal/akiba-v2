name: "Refatoração"
description: "Proponha uma melhoria em código existente"
labels: ["refactor"]
body:
  - type: textarea
    id: target
    attributes:
      label: Alvo
      placeholder: "Arquivo, módulo, fluxo ou trecho que precisa mudar."
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Motivo
      placeholder: "Qual problema técnico isso resolve?"
    validations:
      required: true

  - type: textarea
    id: care
    attributes:
      label: Cuidados
      placeholder: "Riscos, testes ou comportamento que não pode quebrar."
