name: "Documentacao"
description: "Sugira ajuste de documentacao"
labels: ["documentation"]
body:
  - type: textarea
    id: location
    attributes:
      label: Onde
      placeholder: "README, docs, comentario no codigo, rota, componente..."
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: O que ajustar?
      placeholder: "O que falta, esta confuso ou precisa ser atualizado?"
    validations:
      required: true
