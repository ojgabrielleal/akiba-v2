name: Documentation
description: Improve or add documentation
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Propose documentation improvements or additions for the project.

  - type: input
    id: title
    attributes:
      label: Documentation title
      description: "Example: Document the posts API."
      placeholder: "Enter a descriptive title"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "What will be documented?"
      placeholder: "What documentation is missing or needs improvement?"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?
      description: "Why should this documentation be added or improved?"
      placeholder: |
        - New developers have trouble understanding it
        - API is not documented
        - Setup is complicated
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: Proposed content
      description: "Write or describe the content that will be documented."
      placeholder: |
        # Title

        ## Main sections
        - Introduction
        - How to use
        - Examples
        - Troubleshooting

  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: "Where will it be added or updated?"
      placeholder: "docs/api.md or README.md"

  - type: checkboxes
    id: type
    attributes:
      label: Documentation type
      options:
        - label: "README"
        - label: "API docs"
        - label: "Setup/Installation"
        - label: "Architecture/Design"
        - label: "Code comments"
        - label: "Troubleshooting"
        - label: "Contributing guidelines"

  - type: checkboxes
    id: audience
    attributes:
      label: Target audience
      options:
        - label: "New developers"
        - label: "API users"
        - label: "Maintainers"
        - label: "Contributors"

  - type: textarea
    id: resources
    attributes:
      label: Useful resources
      description: "Links, references, or examples that should be included."
      placeholder: |
        - Link to related issue
        - Link to PR
        - Code examples

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High, critical for onboarding
        - Medium, useful to have
        - Low, future improvement
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: "Any extra information."
      placeholder: "Additional context, suggestions, etc."
