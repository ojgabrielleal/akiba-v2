name: Feature Request
description: Request a new feature or improvement
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature. Please fill in the details below.

  - type: input
    id: title
    attributes:
      label: Feature title
      description: "Example: Add dark theme support."
      placeholder: "Enter a descriptive title"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Briefly describe the desired feature."
      placeholder: "Explain the desired feature."
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Goal
      description: "What is the main goal of this feature?"
      placeholder: "What problem does this solve or what value does it add?"
    validations:
      required: true

  - type: textarea
    id: benefits
    attributes:
      label: Benefits
      description: "What benefits or improvements are expected?"
      placeholder: |
        - Improves the user experience
        - Makes code maintenance easier

  - type: textarea
    id: tasks
    attributes:
      label: Proposed tasks
      description: "List the tasks that need to be done."
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
        - [ ] Task 3

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: "Add any relevant context, screenshot, or reference."
      placeholder: "Links, examples, mockups, etc."

  - type: checkboxes
    id: area
    attributes:
      label: Project area
      options:
        - label: "⚙️ Backend"
        - label: "🎨 Frontend"
        - label: "📚 Documentation"
        - label: "🚀 DevOps/Infrastructure"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🔥 High"
        - "⚠️ Medium"
        - "🌱 Low"
    validations:
      required: true
