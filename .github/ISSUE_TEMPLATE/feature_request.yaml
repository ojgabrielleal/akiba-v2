name: "Funcionalidade"
description: "Sugira melhoria ou nova funcionalidade"
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: Necessidade
      placeholder: "Qual problema, fluxo ou oportunidade motiva isso?"
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Resultado esperado
      placeholder: "Como deve funcionar quando estiver pronto?"
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: Referencias
      placeholder: "Links, prints, exemplos ou observacoes."
