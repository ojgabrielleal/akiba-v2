name: "Bug"
description: "Relate um problema ou comportamento inesperado"
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Descricao
      placeholder: "O que aconteceu?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Como reproduzir
      placeholder: |
        1. Acesse...
        2. Clique em...
        3. Veja o erro...

  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
      placeholder: "O que deveria acontecer?"

  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      placeholder: "Logs, prints, navegador, ambiente ou links relacionados."
