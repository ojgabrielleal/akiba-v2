name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the information below to help us resolve the issue quickly.

  - type: input
    id: title
    attributes:
      label: Bug title
      description: "Example: Error loading posts on the home page."
      placeholder: "Enter a descriptive title"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Describe the bug you observed."
      placeholder: "What did you notice was wrong?"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "List the exact steps to reproduce the bug."
      placeholder: |
        1. Go to...
        2. Click on...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: "What should happen?"
      placeholder: "Describe the expected behavior."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: "What is happening instead?"
      placeholder: "Describe the incorrect behavior."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - "⚙️ Backend"
        - "🎨 Frontend"
        - "🗄️ Database"
        - "🔐 Authentication"
        - "🔌 API"
        - "📦 Other"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Example: Chrome 125.0, Firefox 120.0"

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: "Add screenshots, error logs, or any relevant information."
      placeholder: "Paste error logs or screenshots of the issue."

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: "Any additional context that may be useful."
      placeholder: "Environment, database, links, context, etc."

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "🚨 Critical, production is broken"
        - "🔥 High, functionality is unavailable"
        - "⚠️ Medium, unexpected behavior"
        - "🌱 Low, minor inconvenience"
    validations:
      required: true
