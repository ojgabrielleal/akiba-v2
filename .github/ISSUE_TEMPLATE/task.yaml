name: Task
description: Add a general task to the project
labels: []
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Create a new task for the project. Define the details and related work.

  - type: input
    id: title
    attributes:
      label: Task title
      description: "Example: Implement OAuth authentication."
      placeholder: "Enter a descriptive title"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Describe in detail what needs to be done."
      placeholder: "Explain the task clearly."
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Goal
      description: "What is the purpose of this task?"
      placeholder: "What problem does it solve or what improvement does it bring?"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Subtasks
      description: "List subtasks or checkpoints."
      placeholder: |
        - [ ] Task 1
        - [ ] Task 2
        - [ ] Task 3
        - [ ] Validate and test

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: "What defines this task as complete?"
      placeholder: |
        - Feature X works correctly
        - Tests pass
        - Documentation is updated

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: "Extra context, references, or important information."
      placeholder: "Links, dependencies, constraints, etc."

  - type: checkboxes
    id: area
    attributes:
      label: Project area
      options:
        - label: "Backend"
        - label: "Frontend"
        - label: "Database"
        - label: "DevOps"
        - label: "Documentation"

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Estimate in hours
      placeholder: "How many hours do you estimate?"

  - type: input
    id: assignee
    attributes:
      label: Assignee
      placeholder: "@username or leave blank"
